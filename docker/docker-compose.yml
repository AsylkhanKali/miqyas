version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: miqyas-postgres
    environment:
      POSTGRES_USER: miqyas
      POSTGRES_PASSWORD: miqyas_dev
      POSTGRES_DB: miqyas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miqyas"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: miqyas-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: miqyas-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://miqyas:miqyas_dev@postgres:5432/miqyas
      DATABASE_URL_SYNC: postgresql://miqyas:miqyas_dev@postgres:5432/miqyas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - uploads:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: miqyas-celery
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://miqyas:miqyas_dev@postgres:5432/miqyas
      DATABASE_URL_SYNC: postgresql://miqyas:miqyas_dev@postgres:5432/miqyas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - uploads:/app/uploads
    command: >
      celery -A app.tasks.worker worker
      --loglevel=info
      --concurrency=4
      -Q parsing,video,gpu,celery,default

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: miqyas-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
