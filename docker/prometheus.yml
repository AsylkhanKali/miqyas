# MIQYAS — Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "miqyas-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "miqyas-api"

  - job_name: "caddy"
    static_configs:
      - targets: ["caddy:2019"]
        labels:
          service: "caddy"
